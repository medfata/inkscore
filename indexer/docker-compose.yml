# DEPRECATED: This indexer has been replaced by indexer-v1
# Please use ../indexer-v1/docker-compose.yml instead
#
# To migrate:
# 1. cd ../indexer-v1
# 2. docker-compose up -d postgres
# 3. docker-compose --profile setup run migrate
# 4. docker-compose up -d indexer

version: "3.8"

services:
  postgres:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_USER: ink
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ink_analytics
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    command: >
      postgres
      -c listen_addresses='*'
      -c password_encryption=scram-sha-256
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ink -d ink_analytics"]
      interval: 5s
      timeout: 5s
      retries: 5

  # DEPRECATED - Use indexer-v1 instead
  indexer:
    build: .
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://ink:${DB_PASSWORD}@postgres:5432/ink_analytics
      RPC_URL: ${RPC_URL}
      POLL_INTERVAL_MS: ${POLL_INTERVAL_MS:-15000}
    profiles:
      - legacy  # Only runs with --profile legacy

volumes:
  postgres_data:
