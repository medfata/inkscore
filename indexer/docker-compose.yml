version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_USER: ink
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ink_analytics
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ink -d ink_analytics"]
      interval: 5s
      timeout: 5s
      retries: 5

  indexer:
    build: .
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://ink:${DB_PASSWORD}@postgres:5432/ink_analytics
      RPC_URL: ${RPC_URL}
      POLL_INTERVAL_MS: ${POLL_INTERVAL_MS:-15000}

volumes:
  postgres_data:
